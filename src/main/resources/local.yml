spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true
  session:
    store-type: redis
    redis:
      namespace: jjabtwit-session
  data:
    redis:
      host: localhost
      password: 1234
      port: 6379

server:
  servlet:
    session:
      cookie:
        name: JSESSIONID

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace

salt:
  en1: locals1
  en2: localS2

